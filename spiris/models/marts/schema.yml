version: 2

models:
  - name: orders_enriched
    description: "One row per valid order, enriched with customer country and order-level metrics."
    columns:
      - name: order_id
        description: "Primary key for enriched orders."
        tests:
          - not_null
          - unique

      - name: order_timestamp
        tests:
          - not_null

      - name: order_date
        tests:
          - not_null

      - name: customer_id
        tests:
          - not_null

      - name: country
        tests:
          - not_null:
              config:
                severity: warn

      - name: order_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['completed', 'cancelled', 'refunded']

      - name: order_total_amount
        tests:
          - not_null

      - name: number_of_items
        tests:
          - not_null

  - name: daily_sales
    description: "One row per calendar day with completed-order sales metrics."
    columns:
      - name: date
        tests:
          - not_null
          - unique

      - name: total_revenue
        tests:
          - not_null

      - name: total_orders
        tests:
          - not_null

      - name: average_order_value
        tests:
          - not_null

  - name: category_sales
    description: "One row per product category with completed-order revenue and quantity sold."
    columns:
      - name: category
        tests:
          - not_null
          - unique

      - name: total_revenue
        tests:
          - not_null

      - name: total_quantity_sold
        tests:
          - not_null

  - name: customer_sales_summary
    description: "One row per customer with completed-order customer sales metrics."
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

      - name: total_orders
        tests:
          - not_null

      - name: total_revenue
        tests:
          - not_null

      - name: average_order_value
        tests:
          - not_null

  - name: data_quality_issues
    description: "One row per detected data quality issue."
    columns:
      - name: source_table
        tests:
          - not_null

      - name: record_id
        tests:
          - not_null:
              config:
                severity: warn

      - name: issue_type
        tests:
          - not_null

      - name: issue_severity
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['low', 'medium', 'high']

      - name: issue_description
        tests:
          - not_null

      - name: suggested_owner
        tests:
          - not_null