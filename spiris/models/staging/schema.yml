version: 2

models:
  - name: stg_customers
    description: "Typed customer source data from customers.csv."
    columns:
      - name: customer_id
        description: "Primary key for customers."
        tests:
          - not_null
          - unique

      - name: country
        description: "Customer country."
        tests:
          - not_null:
              config:
                severity: warn

      - name: signup_date
        description: "Date when the customer signed up."
        tests:
          - not_null:
              config:
                severity: warn

  - name: stg_products
    description: "Typed product source data from products.csv."
    columns:
      - name: product_id
        description: "Primary key for products."
        tests:
          - not_null
          - unique

      - name: category
        description: "Product category."
        tests:
          - not_null

      - name: product_name
        description: "Product name."
        tests:
          - not_null

  - name: stg_orders
    description: "Typed order source data from orders.csv."
    columns:
      - name: order_id
        description: "Primary key for orders."
        tests:
          - not_null
          - unique

      - name: customer_id
        description: "Foreign key to customers."
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id

      - name: order_timestamp
        description: "Timestamp for when the order was placed."
        tests:
          - not_null

      - name: order_status
        description: "Status of the order."
        tests:
          - not_null
          - accepted_values:
              values: ['completed', 'cancelled', 'refunded']

  - name: stg_order_items
    description: "Typed order line item source data from order_items.csv."
    columns:
      - name: order_id
        description: "Foreign key to orders."
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id

      - name: product_id
        description: "Foreign key to products."
        tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id

      - name: quantity
        description: "Number of units ordered."
        tests:
          - not_null

      - name: price_per_unit
        description: "Unit price at the time of order."
        tests:
          - not_null